name: Release

on:
  workflow_dispatch:
    inputs:
      tag:
        description: "Release tag (e.g. v0.2.0-testnet-live.1)"
        required: true
      title:
        description: "Release title"
        required: true
        default: "Testnet Live Release"

permissions:
  contents: write

jobs:
  build-and-release:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          check-latest: true

      - name: Build release artifacts
        run: |
          mkdir -p dist
          mkdir -p dist/bundle-linux-amd64 dist/bundle-windows-amd64 dist/bundle-macos-amd64

          GOOS=linux GOARCH=amd64 go build -o dist/bundle-linux-amd64/fairchain-node ./cmd/node
          GOOS=linux GOARCH=amd64 go build -o dist/bundle-linux-amd64/fairchain-cli ./cmd/cli

          GOOS=windows GOARCH=amd64 go build -o dist/bundle-windows-amd64/fairchain-node.exe ./cmd/node
          GOOS=windows GOARCH=amd64 go build -o dist/bundle-windows-amd64/fairchain-cli.exe ./cmd/cli

          GOOS=darwin GOARCH=amd64 go build -o dist/bundle-macos-amd64/fairchain-node ./cmd/node
          GOOS=darwin GOARCH=amd64 go build -o dist/bundle-macos-amd64/fairchain-cli ./cmd/cli

          cp scripts/chaos_test.py dist/bundle-linux-amd64/chaos_test.py
          cp scripts/chaos_test.py dist/bundle-windows-amd64/chaos_test.py
          cp scripts/chaos_test.py dist/bundle-macos-amd64/chaos_test.py

          chmod +x dist/bundle-linux-amd64/fairchain-node dist/bundle-linux-amd64/fairchain-cli dist/bundle-linux-amd64/chaos_test.py
          chmod +x dist/bundle-macos-amd64/fairchain-node dist/bundle-macos-amd64/fairchain-cli dist/bundle-macos-amd64/chaos_test.py

          tar -C dist -czf dist/fairchain-linux-amd64.tar.gz bundle-linux-amd64
          tar -C dist -czf dist/fairchain-windows-amd64.tar.gz bundle-windows-amd64
          tar -C dist -czf dist/fairchain-macos-amd64.tar.gz bundle-macos-amd64

      - name: Create release notes
        run: |
          cat > dist/RELEASE_NOTES.md <<'EOF'
          ## Testnet Live

          Testnet is LIVE and large bounties are available for anyone who can break consensus and provide the exact steps taken so they can be reproduced.

          ## Included Assets

          - `fairchain-linux-amd64.tar.gz`
          - `fairchain-windows-amd64.tar.gz`
          - `fairchain-macos-amd64.tar.gz`
          EOF

      - name: Create GitHub release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release create "${{ github.event.inputs.tag }}" \
            --title "${{ github.event.inputs.title }}" \
            --notes-file dist/RELEASE_NOTES.md \
            dist/fairchain-linux-amd64.tar.gz \
            dist/fairchain-windows-amd64.tar.gz \
            dist/fairchain-macos-amd64.tar.gz
